<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenLogistics Command Center</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Leaflet.js Geographic Map Library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="crt-overlay"></div> <!-- Gamified CRT effect -->

    <div class="dashboard-container">
        <!-- Gamified HUD Header -->
        <header class="hud-header glass-panel">
            <div class="logo">
                <i class="fa-solid fa-satellite-dish pulse-icon"></i>
                <h1><span class="neon-text">OPENLOGISTICS</span> CMD</h1>
            </div>
            
            <div class="scoreboard">
                <div class="score-card">
                    <span class="label">Time Step</span>
                    <span class="value digital-text" id="stat-time">0</span>
                </div>
                <div class="score-card">
                    <span class="label">Delivery Rate</span>
                    <span class="value digital-text" id="stat-delivery">0%</span>
                </div>
                <div class="score-card">
                    <span class="label">Completed</span>
                    <span class="value digital-text" id="stat-completed">0</span>
                </div>
                <div class="score-card highlight">
                    <span class="label">Score</span>
                    <span class="value digital-text neon-text" id="stat-score">0.000</span>
                </div>
            </div>

            <div class="controls">
                <select id="task-selector" class="cyberpunk-select">
                    <option value="easy_delivery">EASY: Basic Delivery</option>
                    <option value="medium_optimization">MEDIUM: Multi-Order</option>
                    <option value="hard_crisis">HARD: Crisis Mode</option>
                </select>
                <button id="btn-reset" class="btn cyberpunk-btn" title="Restart Environment">
                    <i class="fa-solid fa-power-off"></i> REBOOT
                </button>
            </div>
        </header>
        
        <main class="main-content">
            
            <!-- Leaflet Geographic Simulation Container -->
            <div id="vis-container" class="glass-panel map-container">
                <!-- Leaflet automatically injects the map SVGs & Nodes here -->
            </div>
            
            <!-- Cinematic HUD Narrative Modal -->
            <div id="narrative-box" class="narrative-box crt-flicker" style="display: none;">
                <button id="btn-skip-demo" class="btn cyberpunk-btn skip-btn">SKIP <i class="fa-solid fa-forward"></i></button>
                <div class="narrative-text" id="narrative-text"></div>
            </div>

            <!-- Task Info Panel -->
            <div id="task-info" class="task-panel glass-panel" style="display: none;">
                <div class="task-header">
                    <i class="fa-solid fa-flag-checkered"></i> CURRENT MISSION
                </div>
                <div id="task-details" class="task-content">
                    <div class="task-name">-</div>
                    <div class="task-desc">-</div>
                    <div class="task-orders">Orders: <span id="task-order-count">0</span></div>
                    <div class="task-time">Time Limit: <span id="task-max-steps">0</span></div>
                </div>
            </div>

            <!-- Order Panel -->
            <div id="order-panel" class="side-panel glass-panel" style="display: none;">
                <div class="panel-header">
                    <i class="fa-solid fa-box-open"></i> ORDERS
                    <span id="order-count" class="badge">0</span>
                </div>
                <div id="order-list" class="panel-content"></div>
            </div>

            <!-- Warehouse Panel -->
            <div id="warehouse-panel" class="side-panel glass-panel" style="display: none;">
                <div class="panel-header">
                    <i class="fa-solid fa-warehouse"></i> WAREHOUSES
                </div>
                <div id="warehouse-list" class="panel-content"></div>
            </div>

            <!-- Action Control Panel -->
            <div id="action-panel" class="action-panel glass-panel" style="display: none;">
                <div class="action-header">
                    <i class="fa-solid fa-gamepad"></i> COMMAND CONSOLE
                </div>
                <div class="action-form">
                    <select id="action-truck">
                        <option value="">Select Truck</option>
                    </select>
                    <select id="action-type">
                        <option value="load">LOAD</option>
                        <option value="unload">UNLOAD</option>
                        <option value="move">MOVE</option>
                        <option value="deliver">DELIVER</option>
                        <option value="wait">WAIT</option>
                    </select>
                    <input type="text" id="action-target" placeholder="Target (W1/W2/...)">
                    <input type="text" id="action-items" placeholder="Items (e.g. itemA:30)">
                    <input type="text" id="action-order" placeholder="Order ID (for deliver)">
                    <button id="btn-execute" class="btn cyberpunk-btn">EXECUTE</button>
                </div>
                <div class="quick-actions">
                    <button class="btn-small" onclick="quickLoadMove()">Load & Move</button>
                    <button class="btn-small" onclick="quickDeliver()">Deliver</button>
                    <button class="btn-small" id="btn-auto-move" onclick="toggleAutoMove()">Auto-Move: OFF</button>
                </div>
                <div class="action-history">
                    <div class="history-header">HISTORY</div>
                    <div id="action-log" class="history-content"></div>
                </div>
            </div>
            
            <!-- Matrix Style Terminal -->
            <div class="terminal-panel glass-panel">
                <div class="terminal-header">
                    <i class="fa-solid fa-terminal"></i> SYSTEM.LOG
                </div>
                <ul id="log-list" class="log-list">
                    <li><span class="muted">Initializing satellite uplink mapping grids...</span></li>
                </ul>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
