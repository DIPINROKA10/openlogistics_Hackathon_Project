name: openlogistics
description: AI Supply Chain Optimization Environment
version: 1.0.0
environment_api_version: 1.0.0
tasks:
  - id: easy_delivery
    name: Basic Delivery
    difficulty: easy
    description: Deliver goods from W1 to W2 within the deadline
    max_episode_steps: 20
    reward:
      type: delivery_rate
      range: [0.0, 1.0]
endpoints:
  reset: POST /api/v1/reset
  step: POST /api/v1/step
  state: GET /api/v1/state
  grade: GET /api/v1/grade
  health: GET /api/v1/health
grading:
  score_range: [0.0, 1.0]
  metrics:
    - score
    - delivery_rate
    - cost_efficiency
    - time_efficiency
